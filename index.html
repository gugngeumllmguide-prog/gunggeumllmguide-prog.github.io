<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>창덕궁 AI 가이드</title>
<script src="https://cdn.jsdelivr.net/npm/js-aruco2/build/aruco.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #000; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; background-size: cover; background-position: center; }
  #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  #scan-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .corner { position: absolute; width: 36px; height: 36px; border-color: rgba(201,168,76,0.9); border-style: solid; border-width: 0; }
  .tl { top:30%; left:25%; border-top-width:3px; border-left-width:3px; }
  .tr { top:30%; right:25%; border-top-width:3px; border-right-width:3px; }
  .bl { top:70%; left:25%; border-bottom-width:3px; border-left-width:3px; }
  .br { top:70%; right:25%; border-bottom-width:3px; border-right-width:3px; }
  #scan-hint { position: fixed; top: 28%; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-size: 13px; letter-spacing: 0.05em; z-index: 2; text-shadow: 0 1px 4px rgba(0,0,0,0.6); transition: opacity 0.4s; white-space: nowrap; }
  #statusbar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 14px 18px 10px; background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent); display: flex; align-items: center; gap: 10px; }
  #location-tag { background: rgba(201,168,76,0.92); color: #1A2744; font-size: 13px; font-weight: 700; padding: 5px 14px; border-radius: 20px; display: none; }
  #type-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 12px; letter-spacing: 0.06em; display: none; }
  .badge-rag { background: rgba(26,74,110,0.85); color: #90C4E8; border: 1px solid rgba(100,160,220,0.5); }
  .badge-llm { background: rgba(46,125,82,0.8); color: #7DCEA0; border: 1px solid rgba(100,200,140,0.5); }
  #character-area { position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%); z-index: 10; display: none; flex-direction: column; align-items: center; gap: 10px; width: 88%; max-width: 380px; }
#speech-bubble {
  background: rgba(255,255,255,0.96);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 14px 18px;
  font-size: 14px;
  line-height: 1.65;
  color: #1A2744;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  width: 100%;
  min-height: 52px;
  max-height: 40vh;
  overflow-y: auto;
  position: relative;
}
#speech-bubble::after { content: ''; position: absolute; bottom: -10px; left: 28px; width: 0; height: 0; border-left: 10px solid transparent; border-right: 4px solid transparent; border-top: 10px solid rgba(255,255,255,0.96); }
  .typing { display: inline-flex; gap: 4px; align-items: center; height: 20px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #1A2744; opacity: 0.4; animation: dot 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,60%,100%{opacity:0.25;transform:scale(1)} 30%{opacity:1;transform:scale(1.3)} }
  #char-img { width: 90px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); order: 1; }
  #bottom-ui { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 14px 16px 28px; background: linear-gradient(to top, rgba(0,0,0,0.75) 70%, transparent); }
  #mic-btn { width: 64px; height: 64px; border-radius: 50%; border: none; background: rgba(201,168,76,0.95); color: #1A2744; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(201,168,76,0.4); transition: transform 0.15s, background 0.2s; -webkit-tap-highlight-color: transparent; }
  #mic-btn:active { transform: scale(0.92); }
  #mic-btn.listening { background: rgba(220,50,50,0.9); animation: mic-pulse 1s infinite; }
  @keyframes mic-pulse { 0%,100%{box-shadow:0 4px 16px rgba(220,50,50,0.4)} 50%{box-shadow:0 4px 28px rgba(220,50,50,0.8)} }
  #mic-label { text-align: center; color: rgba(255,255,255,0.8); font-size: 12px; letter-spacing: 0.04em; }
  #text-input-row { display: flex; gap: 8px; margin-top: 10px; }
  #text-input { flex: 1; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); border-radius: 24px; padding: 10px 16px; color: #fff; font-size: 14px; outline: none; }
  #text-input::placeholder { color: rgba(255,255,255,0.45); }
  #send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(201,168,76,0.85); color: #1A2744; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #manual-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; background: rgba(26,39,68,0.97); border: 1px solid rgba(201,168,76,0.4); border-radius: 20px; padding: 24px; width: 300px; max-height: 80vh; overflow-y: auto; display: none; }
  #manual-panel h3 { color: #C9A84C; font-size: 15px; margin-bottom: 14px; text-align: center; }
  .manual-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(201,168,76,0.25); border-radius: 10px; color: #F5F0E8; font-size: 13px; cursor: pointer; text-align: left; transition: background 0.2s; }
  .manual-btn:hover { background: rgba(201,168,76,0.15); }
  .manual-btn span { color: #C9A84C; font-weight: 700; margin-right: 8px; }
  #camera-btn { width: 64px; height: 64px; border-radius: 50%; border: none; background: rgba(100,160,220,0.85); color: #fff; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(100,160,220,0.4); transition: transform 0.15s; -webkit-tap-highlight-color: transparent; }
  #camera-btn:active { transform: scale(0.92); }
  #demo-toggle { position: fixed; bottom: 130px; right: 16px; z-index: 15; width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.5); background: rgba(26,39,68,0.85); color: #C9A84C; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" style="display:none"></canvas>

<div id="scan-overlay">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
</div>
<div id="scan-hint">📷 버튼으로 사진을 찍으세요</div>


<div id="statusbar">
  <div id="location-tag"></div>
  <div id="type-badge"></div>
</div>
<div style="position:fixed; top:52px; left:0; right:0; z-index:10; text-align:center; font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:0.03em; text-shadow:0 1px 3px rgba(0,0,0,0.6);">
  AI 답변은 참고용이며 실제 내용과 다를 수 있습니다.
</div>

<div id="character-area">
  <div id="speech-bubble">안녕하세요! 마커를 찍으면 안내를 시작합니다.</div>
  <img id="char-img" src="character.png" onerror="this.style.display='none'">
</div>

<div id="bottom-ui">
  <div style="display:flex; justify-content:center; gap:20px; margin-bottom:10px;">
    <button id="camera-btn" onclick="document.getElementById('photo-input').click()">📷</button>
    <button id="mic-btn" onclick="toggleMic()">🎤</button>
  </div>
  <input id="photo-input" type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
  <div id="mic-label">마이크를 눌러 질문하세요</div>
  <div id="text-input-row">
    <input id="text-input" type="text" placeholder="텍스트로 질문하기..." onkeydown="if(event.key==='Enter') sendText()">
    <button id="send-btn" onclick="sendText()">➤</button>
  </div>
</div>

<button id="demo-toggle" onclick="toggleManual()" title="장소 직접 선택">📍</button>

<div id="manual-panel">
  <h3>📍 장소 직접 선택 </h3>
  <button class="manual-btn" onclick="triggerLocation('금천교', 24)"><span>ID 24</span>금천교 — 궁의 첫 관문, 나쁜 기운을 막는 돌다리</button>
  <button class="manual-btn" onclick="triggerLocation('낙선재', 25)"><span>ID 25</span>낙선재 — 왕이 독서·휴식을 즐기던 소박한 사랑채</button>
  <button class="manual-btn" onclick="triggerLocation('대조전', 26)"><span>ID 26</span>대조전 — 왕비의 침전, 용마루 없는 지붕이 특징</button>
  <button class="manual-btn" onclick="triggerLocation('돈화문', 27)"><span>ID 27</span>돈화문 — 창덕궁 정문, 현존 가장 오래된 궁궐 대문</button>
  <button class="manual-btn" onclick="triggerLocation('부용지', 28)"><span>ID 28</span>부용지 — 하늘은 둥글고 땅은 네모란 뜻의 연못</button>
  <button class="manual-btn" onclick="triggerLocation('선정전', 29)"><span>ID 29</span>선정전 — 왕이 신하와 일상 정무를 보던 편전</button>
  <button class="manual-btn" onclick="triggerLocation('애련지', 30)"><span>ID 30</span>애련지 — 숙종이 연꽃을 사랑해 이름 붙인 연못</button>
  <button class="manual-btn" onclick="triggerLocation('연경당', 31)"><span>ID 31</span>연경당 — 궁 안의 사대부 저택, 단청 없는 소박함</button>
  <button class="manual-btn" onclick="triggerLocation('인정전', 32)"><span>ID 32</span>인정전 — 즉위식·외교를 치른 창덕궁 으뜸 정전</button>
  <button class="manual-btn" onclick="triggerLocation('희정당', 33)"><span>ID 33</span>희정당 — 왕의 집무실, 서양식 내부 장식이 남아있음</button>
  <button class="manual-btn" style="border-color:rgba(255,80,80,0.4); color:#FF9999; margin-top:4px;" onclick="toggleManual()">✕ 닫기</button>
</div>

<script>
const SERVER = "https://gunggeumllmguide-prog-github-io.onrender.com/";
const SESSION_ID = "sess_" + Date.now();
let sessionDir = "";

let currentLocation = null;
let currentPhotoData = "";
let isSpeaking = false;
let isListening = false;
let mediaRecorder = null;
let audioChunks = [];

window.addEventListener("load", async () => {
  speechSynthesis.onvoiceschanged = () => {};
  try {
    const res = await fetch(`${SERVER}/init_session`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: SESSION_ID })
    });
    const data = await res.json();
    sessionDir = data.session_dir;
  } catch(e) {
    console.warn("[세션] 폴더 초기화 실패:", e);
  }
});

function setBackground(base64) {
  document.getElementById("video").style.display = "none";
  document.body.style.backgroundImage = "url(" + base64 + ")";
}

function clearBackground() {
  currentPhotoData = "";
  document.body.style.backgroundImage = "";
  document.getElementById("video").style.display = "";
}

async function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = "";
  document.getElementById("scan-hint").style.opacity = "1";
  document.getElementById("scan-hint").textContent = "사진 분석 중...";

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result;
    try {
      const res = await fetch(`${SERVER}/detect_marker`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: base64 })
      });
      const data = await res.json();
      if (data.marker_id !== null) {
        clearBackground();
        document.getElementById("scan-hint").textContent = "마커 ID: " + data.marker_id;
        onMarkerDetected(data.marker_id);
      } else {
        currentPhotoData = base64;
        setBackground(base64);
        document.getElementById("scan-hint").textContent = "사진이 설정됐습니다. 질문하세요.";
      }
    } catch(e) {
      document.getElementById("scan-hint").textContent = "서버 연결 오류";
    }
  };
  reader.readAsDataURL(file);
}


async function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = "";
  document.getElementById("scan-hint").style.opacity = "1";
  document.getElementById("scan-hint").textContent = "사진 분석 중...";

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result;
    try {
      const res = await fetch(`${SERVER}/detect_marker`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: base64 })
      });
      const data = await res.json();
      if (data.marker_id !== null) {
        clearBackground();
        document.getElementById("scan-hint").textContent = "마커 ID: " + data.marker_id;
        onMarkerDetected(data.marker_id);
      } else {
        currentPhotoData = base64;
        setBackground(base64);
        document.getElementById("scan-hint").textContent = "사진 분석 중...";
        document.getElementById("character-area").style.display = "flex";
        showBubble('<div class="typing"><span></span><span></span><span></span></div>');
        await sendQuestion("이 사진 속 요소가 뭔지 설명해줘");
        document.getElementById("scan-hint").textContent = "추가 질문을 입력하거나 말하세요.";
      }
    } catch(e) {
      document.getElementById("scan-hint").textContent = "서버 연결 오류";
    }
  };
  reader.readAsDataURL(file);
}

async function sendQuestion(question) {
  if (!question.trim()) return;
  if (!currentLocation && !currentPhotoData) {
    speak("먼저 마커를 스캔해주세요.");
    return;
  }
  showBubble('<div class="typing"><span></span><span></span><span></span></div>');
  try {
    const res = await fetch(`${SERVER}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        question,
        location: currentLocation || "알 수 없음",
        session_id: SESSION_ID,
        image: currentPhotoData,
        session_dir: sessionDir
      })
    });
    const data = await res.json();
    showBadge(data.type);
    showBubble(data.answer);
    speak(data.answer);
  } catch(e) {
    showBubble("서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.");
  }
}

const MARKER_MAP = {
  24: "금천교", 25: "낙선재", 26: "대조전", 27: "돈화문", 28: "부용지",
  29: "선정전", 30: "애련지", 31: "연경당", 32: "인정전", 33: "희정당"
};

function onMarkerDetected(id) {
  const location = MARKER_MAP[id];
  if (!location || location === currentLocation) return;
  currentLocation = location;
  startLocation(location);
}

async function startLocation(location) {
  clearBackground();
  const tag = document.getElementById("location-tag");
  tag.textContent = "📍 " + location;
  tag.style.display = "block";
  document.getElementById("scan-hint").style.opacity = "0";
  document.getElementById("character-area").style.display = "flex";
  showBubble('<div class="typing"><span></span><span></span><span></span></div>');
  try {
    await fetch(`${SERVER}/reset`, { method: "POST" });
    const res = await fetch(`${SERVER}/welcome`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ location, session_id: SESSION_ID, session_dir: sessionDir })
    });
    const data = await res.json();
    showBubble(data.message);
    speak(data.message);
  } catch(e) {
    const fallback = "안녕하세요! 현재 위치는 " + location + "입니다. 서버에 연결할 수 없어 오프라인 모드로 동작합니다.";
    showBubble(fallback);
    speak(fallback);
  }
}

async function sendQuestion(question) {
  if (!question.trim()) return;
  if (!currentLocation) { speak("먼저 마커를 스캔해주세요."); return; }
  showBubble('<div class="typing"><span></span><span></span><span></span></div>');
  try {
    const res = await fetch(`${SERVER}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, location: currentLocation, session_id: SESSION_ID, image: currentPhotoData, session_dir: sessionDir })
    });
    const data = await res.json();
    showBadge(data.type);
    showBubble(data.answer);
    speak(data.answer);
  } catch(e) {
    showBubble("서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.");
  }
}

function sendText() {
  const input = document.getElementById("text-input");
  const q = input.value.trim();
  if (!q) return;
  input.value = "";
  sendQuestion(q);
}

async function toggleMic() {
  if (isSpeaking) { speechSynthesis.cancel(); isSpeaking = false; }
  if (isListening) { mediaRecorder.stop(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported("audio/ogg; codecs=opus")
      ? "audio/ogg; codecs=opus"
      : MediaRecorder.isTypeSupported("audio/mp4")
      ? "audio/mp4"
      : "audio/webm";
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    audioChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      isListening = false;
      const btn = document.getElementById("mic-btn");
      btn.classList.remove("listening");
      btn.textContent = "🎤";
      document.getElementById("mic-label").textContent = "인식 중...";
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: mimeType });
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const res = await fetch(`${SERVER}/transcribe`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ audio: e.target.result, mime_type: mimeType, session_id: SESSION_ID, session_dir: sessionDir })
          });
          const data = await res.json();
          if (data.text) {
            document.getElementById("text-input").value = data.text;
            document.getElementById("mic-label").textContent = "마이크를 눌러 질문하세요";
            sendQuestion(data.text);
          } else {
            document.getElementById("mic-label").textContent = "인식 실패. 다시 시도해주세요.";
          }
        } catch(e) {
          document.getElementById("mic-label").textContent = "서버 오류";
        }
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
    isListening = true;
    const btn = document.getElementById("mic-btn");
    btn.classList.add("listening");
    btn.textContent = "🔴";
    document.getElementById("mic-label").textContent = "녹음 중... 버튼을 눌러 완료";
  } catch(e) {
    alert("마이크 오류: " + e.message);
  }
}

function speak(text, onEnd) {
  speechSynthesis.cancel();
  isSpeaking = true;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ko-KR";
  utter.rate = 1.0;
  utter.pitch = 1.0;
  const voices = speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang.startsWith("ko"));
  if (koVoice) utter.voice = koVoice;
  utter.onend = () => { isSpeaking = false; if (onEnd) onEnd(); };
  utter.onerror = () => { isSpeaking = false; };
  speechSynthesis.speak(utter);
}

function showBubble(html) {
  const bubble = document.getElementById("speech-bubble");
  bubble.innerHTML = html;
  bubble.scrollTop = 0;
}
function showBadge(type) {
  const badge = document.getElementById("type-badge");
  badge.className = type === "RAG" ? "badge-rag" : "badge-llm";
  badge.textContent = type === "RAG" ? "📚 RAG" : "💬 LLM";
  badge.style.display = "inline-block";
  setTimeout(() => { badge.style.display = "none"; }, 3000);
}

function triggerLocation(location, id) {
  toggleManual();
  currentLocation = null;
  onMarkerDetected(id);
}

function toggleManual() {
  const panel = document.getElementById("manual-panel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}
</script>
</body>
</html>
